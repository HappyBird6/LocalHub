<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalHub 챗봇 테스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: #667eea;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.bot .message-content {
            background: #e0e0e0;
            color: #333;
        }

        .message-category {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .loading {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            padding: 10px 15px;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            margin-right: 10px;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #764ba2;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error {
            color: #d32f2f;
            padding: 10px;
            background: #ffebee;
            border-left: 3px solid #d32f2f;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 LocalHub 챗봇</h1>
            <p>지역 관광 정보를 물어보세요!</p>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="message-content">
                    안녕하세요! 저는 LocalHub 챗봇입니다. 어떤 지역 정보를 알고 싶으신가요?
                </div>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="메시지를 입력하세요... (예: 서울 축제)"
                onkeypress="handleEnter(event)"
            >
            <button onclick="sendMessage()" id="sendBtn">전송</button>
        </div>
    </div>

    <script>
        // ⚙️ 설정
        const API_URL = 'http://localhost:8000';
        const USER_ID = 3; // 테스트 사용자 ID

        // 📨 메시지 전송
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // 사용자 메시지 화면에 표시
            displayMessage('user', message);
            input.value = '';

            // 로딩 표시
            displayLoading();

            try {
                // ✅ API 호출
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('API Response:', data);
                // 로딩 제거
                removeLoading();

                // 챗봇 응답 표시
                displayMessage('bot', data.response, data.categories);

            } catch (error) {
                removeLoading();
                console.error('Error:', error);
                displayError(`오류 발생: ${error.message}`);
            }
        }

        // 💬 메시지 화면에 표시
        function displayMessage(role, content, categories = []) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let categoryText = '';
            if (categories && categories.length > 0) {
                categoryText = `<div class="message-category">📌 ${categories.join(', ')}</div>`;
            }

            messageDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(content)}
                    ${categoryText}
                </div>
            `;

            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // 자동 스크롤
        }

        // ⏳ 로딩 표시
        function displayLoading() {
            const chatBox = document.getElementById('chatBox');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = `
                <div class="message-content">
                    <div class="loading">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ❌ 로딩 제거
        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        // ⚠️ 오류 표시
        function displayError(message) {
            const chatBox = document.getElementById('chatBox');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            chatBox.appendChild(errorDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ⌨️ Enter 키 처리
        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 🛡️ XSS 방지
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
